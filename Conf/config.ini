[api]
; 默认接口域名（被项目级配置覆盖）
base_url = https://httpbin.org
timeout = 10

; ============================================================
; 多项目配置：每个项目对应一个 [project_项目名] 节
; 包含：excel_file（用例文件名）、base_url（接口域名）
; 切换方式：运行时加 --project=项目名
; ============================================================

[project_httpbin]
excel_file = api_test_data.xlsx
base_url = https://httpbin.org
description = httpbin基础接口测试

[project_jsonplaceholder]
excel_file = user_api_cases.xlsx
base_url = https://jsonplaceholder.typicode.com
description = JSONPlaceholder用户接口测试

[database]
host = localhost
port = 3306
user = root
password =
database = test
charset = utf8mb4

[global]
; 全局公用参数，可通过 #变量名# 在 Excel 中引用
env = test
